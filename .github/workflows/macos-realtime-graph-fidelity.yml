name: macOS Realtime Graph Fidelity

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/macos-realtime-graph-fidelity.yml"

permissions:
  contents: write
  actions: read

jobs:
  fidelity:
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        mode: [numeric, appkit, heavy-redraw, burst-redraw, memory-churn]
    env:
      MODE: ${{ matrix.mode }}
      OUT: realtime-graph-fidelity-results/${{ matrix.mode }}
    steps:
      - uses: actions/checkout@v4
      - name: Build and run graph mode
        run: |
          set -euxo pipefail
          mkdir -p "$OUT"
          cat > app.swift <<'SWIFT'
          import AppKit
          import Darwin
          func memMB() -> Double {
            var vm = task_vm_info_data_t(); var c = mach_msg_type_number_t(MemoryLayout<task_vm_info_data_t>.size / MemoryLayout<integer_t>.size)
            let r = withUnsafeMutablePointer(to:&vm){p in p.withMemoryRebound(to:integer_t.self,capacity:Int(c)){task_info(mach_task_self_,task_flavor_t(TASK_VM_INFO),$0,&c)}}
            return r == KERN_SUCCESS ? Double(vm.phys_footprint)/1048576.0 : -1
          }
          func cpuNs() -> UInt64 { var t=proc_taskinfo(); let n=proc_pidinfo(getpid(),Int32(PROC_PIDTASKINFO),0,&t,Int32(MemoryLayout<proc_taskinfo>.stride)); return n>0 ? UInt64(t.pti_total_user)+UInt64(t.pti_total_system) : 0 }
          final class V:NSView{var mode="numeric";var text="";var cpu=[Double]();var mem=[Double]();override var isFlipped:Bool{true};override func draw(_ r:NSRect){NSColor.windowBackgroundColor.setFill();bounds.fill();let a:[NSAttributedString.Key:Any]=[.font:NSFont.monospacedDigitSystemFont(ofSize:18,weight:.semibold),.foregroundColor:NSColor.labelColor];text.draw(at:NSPoint(x:20,y:20),withAttributes:a);if mode != "numeric"{let plot=NSRect(x:20,y:120,width:bounds.width-40,height:bounds.height-150);NSColor.separatorColor.setStroke();NSBezierPath(rect:plot).stroke();func line(_ xs:[Double],_ maxv:Double,_ col:NSColor,_ width:CGFloat){guard xs.count>1 else{return};let p=NSBezierPath();for(i,v)in xs.enumerated(){let x=plot.minX+CGFloat(i)*plot.width/CGFloat(xs.count-1);let y=plot.maxY-CGFloat(min(max(v/maxv,0),1))*plot.height;i==0 ? p.move(to:NSPoint(x:x,y:y)) : p.line(to:NSPoint(x:x,y:y))};col.setStroke();p.lineWidth=width;p.stroke()};line(cpu,max(100,cpu.max() ?? 100),.systemBlue,2);line(mem,max(256,mem.max() ?? 256),.systemRed,2);if mode=="heavy-redraw" || mode=="burst-redraw"{for j in 0..<(mode=="burst-redraw" ? 80 : 25){let y=plot.minY+CGFloat(j)*plot.height/CGFloat(mode=="burst-redraw" ? 80 : 25);let p=NSBezierPath();p.move(to:NSPoint(x:plot.minX,y:y));for k in 0...60{let x=plot.minX+CGFloat(k)*plot.width/60;let yy=y+sin(CGFloat(k+j))*4;p.line(to:NSPoint(x:x,y:yy))};NSColor.quaternaryLabelColor.setStroke();p.lineWidth=0.5;p.stroke()}}}}}
          final class D:NSObject,NSApplicationDelegate{let v=V();var keep=[Data]();var churn=[Data]();var load=true;var last=cpuNs();var lastT=DispatchTime.now();var file:FileHandle?;var mode="numeric";func applicationDidFinishLaunching(_ n:Notification){mode=ProcessInfo.processInfo.environment["MODE"] ?? "numeric";let path=ProcessInfo.processInfo.environment["SAMPLES"]!;FileManager.default.createFile(atPath:path,contents:"second,app_cpu_percent,app_memory_mb\n".data(using:.utf8));file=FileHandle(forWritingAtPath:path);file?.seekToEndOfFile();v.mode=mode;for i in 0..<128{keep.append(Data(repeating:UInt8(i),count:1048576))};let w=NSWindow(contentRect:NSRect(x:80,y:80,width:820,height:520),styleMask:[.titled,.closable,.resizable],backing:.buffered,defer:false);w.title="Realtime graph fidelity \(mode) PID \(getpid())";v.frame=w.contentView!.bounds;v.autoresizingMask=[.width,.height];w.contentView!.addSubview(v);w.makeKeyAndOrderFront(nil);let loops = mode=="burst-redraw" ? 160000 : 80000;DispatchQueue.global().async{var x=0.0;while self.load{for i in 1...loops{x += sin(Double(i))};if x>1e12{x=0}}};Timer.scheduledTimer(withTimeInterval:1,repeats:true){_ in self.sample()}}
          var sec=0;func sample(){sec += 1;if mode=="memory-churn"{churn.removeAll(keepingCapacity:false);for i in 0..<64{churn.append(Data(repeating:UInt8((i+sec)%251),count:1048576))}};let now=DispatchTime.now();let c=cpuNs();let wall=now.uptimeNanoseconds-lastT.uptimeNanoseconds;let pct=wall>0 ? Double(c-last)/Double(wall)*100:0;last=c;lastT=now;let m=memMB();v.cpu.append(pct);v.mem.append(m);if v.cpu.count>60{v.cpu.removeFirst();v.mem.removeFirst()};v.text=String(format:"mode %@\nPID %d\napp CPU %.1f%%\napp Memory %.1f MB\nblue CPU red memory",v.mode,getpid(),pct,m);v.needsDisplay=true;if mode=="burst-redraw"{for _ in 0..<8{v.needsDisplay=true;v.displayIfNeeded()}};file?.write("\(sec),\(pct),\(m)\n".data(using:.utf8)!);if sec>=18{load=false;NSApp.terminate(nil)}}}
          let app=NSApplication.shared;let d=D();app.delegate=d;app.setActivationPolicy(.regular);app.run()
          SWIFT
          APP="GraphFidelity-${MODE}"
          ROOT="$PWD/$APP.app"
          mkdir -p "$ROOT/Contents/MacOS"
          printf '%s' "<?xml version='1.0'?><plist version='1.0'><dict><key>CFBundleExecutable</key><string>App</string><key>CFBundleIdentifier</key><string>com.wostgit.graph.$MODE</string><key>CFBundleName</key><string>$APP</string><key>CFBundlePackageType</key><string>APPL</string></dict></plist>" > "$ROOT/Contents/Info.plist"
          xcrun swiftc app.swift -framework AppKit -O -o "$ROOT/Contents/MacOS/App"
          codesign --force --deep --sign - "$ROOT"
          SAMPLES="$PWD/$OUT/app-samples.csv" MODE="$MODE" open -n "$ROOT"
          sleep 2
          PID=$(pgrep -n App)
          echo "second,ps_cpu_percent,ps_rss_mb" > "$OUT/ps-samples.csv"
          for s in $(seq 1 18); do ps -p "$PID" -o %cpu= -o rss= | awk -v s="$s" '{printf "%d,%.3f,%.3f\n",s,$1,$2/1024}' >> "$OUT/ps-samples.csv" || true; sleep 1; done
          screencapture -x "$OUT/screenshot.png" || true
          ditto -c -k --sequesterRsrc --keepParent "$ROOT" "$OUT/$APP.app.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: graph-fidelity-${{ matrix.mode }}
          path: realtime-graph-fidelity-results/

  aggregate:
    runs-on: ubuntu-latest
    needs: fidelity
    if: always() && github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with: { token: "${{ secrets.GITHUB_TOKEN }}", fetch-depth: 0 }
      - uses: actions/download-artifact@v4
        with: { pattern: graph-fidelity-*, path: downloaded, merge-multiple: true }
      - name: Rank approaches
        run: |
          set -euxo pipefail
          rm -rf realtime-graph-fidelity-results
          mkdir -p realtime-graph-fidelity-results
          if [ -d downloaded/realtime-graph-fidelity-results ]; then
            cp -R downloaded/realtime-graph-fidelity-results/. realtime-graph-fidelity-results/
          else
            cp -R downloaded/. realtime-graph-fidelity-results/
          fi
          python3 - <<'PY'
          import csv, json, statistics
          from pathlib import Path
          root = Path('realtime-graph-fidelity-results')
          rows = []
          diagnostics = []
          def read_samples(path, expected):
              raw = path.read_text().strip().splitlines()
              if not raw:
                  return [], []
              first = [x.strip() for x in raw[0].split(',')]
              if set(expected).issubset(set(first)):
                  reader = csv.DictReader(raw)
                  return [{(k or '').strip():(v or '').strip() for k,v in r.items()} for r in reader], first
              # fallback for headerless CSV caused by older FileHandle overwrite bug
              rows = []
              for line in raw:
                  parts = [x.strip() for x in line.split(',')]
                  if len(parts) >= len(expected):
                      rows.append(dict(zip(expected, parts[:len(expected)])))
              return rows, expected
          for d in sorted([p for p in root.iterdir() if p.is_dir()]):
              app_path = d / 'app-samples.csv'
              ps_path = d / 'ps-samples.csv'
              if not app_path.exists() or not ps_path.exists():
                  diagnostics.append({'mode': d.name, 'status': 'missing csv', 'files': [p.name for p in d.iterdir()]})
                  continue
              app, app_fields = read_samples(app_path, ['second','app_cpu_percent','app_memory_mb'])
              ps, ps_fields = read_samples(ps_path, ['second','ps_cpu_percent','ps_rss_mb'])
              n = min(len(app), len(ps))
              if n <= 0:
                  diagnostics.append({'mode': d.name, 'status': 'no samples', 'app_fields': app_fields, 'ps_fields': ps_fields})
                  continue
              cpu_err = []
              mem_gap = []
              app_cpu_values = []
              for i in range(n):
                  try:
                      ac = float(app[i]['app_cpu_percent']); pc = float(ps[i]['ps_cpu_percent'])
                      am = float(app[i]['app_memory_mb']); pm = float(ps[i]['ps_rss_mb'])
                  except Exception as e:
                      diagnostics.append({'mode': d.name, 'status': 'bad row', 'row': i, 'error': str(e), 'app': app[i], 'ps': ps[i]})
                      continue
                  cpu_err.append(abs(ac - pc)); mem_gap.append(abs(am - pm)); app_cpu_values.append(ac)
              if not cpu_err:
                  diagnostics.append({'mode': d.name, 'status': 'no valid numeric rows'})
                  continue
              avg_cpu = float(statistics.mean(app_cpu_values))
              jitter = statistics.pstdev(app_cpu_values) if len(app_cpu_values) > 1 else 0.0
              score = round(statistics.mean(cpu_err) + 0.02 * avg_cpu + 0.01 * jitter + 0.005 * statistics.mean(mem_gap), 3)
              rows.append({'mode': d.name, 'samples': len(cpu_err), 'cpu_mae': round(statistics.mean(cpu_err), 3), 'memory_gap_vs_ps_rss_mb': round(statistics.mean(mem_gap), 3), 'avg_app_cpu': round(avg_cpu, 3), 'cpu_jitter': round(jitter, 3), 'score': score})
          rows.sort(key=lambda r: r['score'])
          (root / 'rankings.json').write_text(json.dumps(rows, indent=2))
          (root / 'diagnostics.json').write_text(json.dumps(diagnostics, indent=2))
          fields = ['mode','samples','cpu_mae','memory_gap_vs_ps_rss_mb','avg_app_cpu','cpu_jitter','score']
          with open(root / 'rankings.csv', 'w', newline='') as f:
              w = csv.DictWriter(f, fieldnames=fields); w.writeheader(); w.writerows(rows)
          with open(root / 'summary.md', 'w') as f:
              f.write('# Realtime Graph Fidelity Rankings\n\n')
              f.write('Lower score is better. This run adds heavier render paths and memory churn. CPU error compares in-app `proc_taskinfo` sampling against external `ps`; memory gap compares app physical footprint against `ps` RSS, so it is diagnostic rather than exact Activity Monitor parity.\n\n')
              if rows:
                  f.write('| Rank | Mode | Samples | CPU MAE | Memory gap vs ps RSS MB | Avg app CPU | CPU jitter | Score |\n|---:|---|---:|---:|---:|---:|---:|---:|\n')
                  for i, r in enumerate(rows, 1):
                      f.write(f"| {i} | {r['mode']} | {r['samples']} | {r['cpu_mae']} | {r['memory_gap_vs_ps_rss_mb']} | {r['avg_app_cpu']} | {r['cpu_jitter']} | {r['score']} |\n")
              else:
                  f.write('No valid modes could be ranked. See `diagnostics.json`.\n')
              if diagnostics:
                  f.write('\n## Diagnostics\n\n')
                  for item in diagnostics:
                      f.write(f"- `{item.get('mode')}`: {item.get('status')}\n")
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add realtime-graph-fidelity-results/
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Add realtime graph fidelity results"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
