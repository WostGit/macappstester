name: macOS Enterprise UI Downloadable Apps

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/macos-enterprise-ui-downloadable-apps.yml"

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        level: [1, 2, 3]
    env:
      LEVEL: ${{ matrix.level }}
      OUT: macos-enterprise-ui-downloadable-apps/macos-14/level-${{ matrix.level }}
    steps:
      - uses: actions/checkout@v4
      - name: Build app
        run: |
          set -euxo pipefail
          mkdir -p "$OUT"
          cat > app.swift <<'SWIFT'
          import AppKit
          import Darwin
          func memMB() -> Double {
            var vm = task_vm_info_data_t()
            var c = mach_msg_type_number_t(MemoryLayout<task_vm_info_data_t>.size / MemoryLayout<integer_t>.size)
            let r = withUnsafeMutablePointer(to: &vm) { p in p.withMemoryRebound(to: integer_t.self, capacity: Int(c)) { task_info(mach_task_self_, task_flavor_t(TASK_VM_INFO), $0, &c) } }
            return r == KERN_SUCCESS ? Double(vm.phys_footprint) / 1048576.0 : -1
          }
          func cpuNs() -> UInt64 {
            var t = proc_taskinfo()
            let n = proc_pidinfo(getpid(), Int32(PROC_PIDTASKINFO), 0, &t, Int32(MemoryLayout<proc_taskinfo>.stride))
            return n > 0 ? UInt64(t.pti_total_user) + UInt64(t.pti_total_system) : 0
          }
          final class Meter: NSView {
            var text = "Starting"
            override var isFlipped: Bool { true }
            override func draw(_ r: NSRect) {
              NSColor.windowBackgroundColor.setFill(); bounds.fill()
              let a: [NSAttributedString.Key: Any] = [.font: NSFont.monospacedDigitSystemFont(ofSize: 22, weight: .semibold), .foregroundColor: NSColor.labelColor]
              text.draw(at: NSPoint(x:24, y:24), withAttributes:a)
            }
          }
          final class D: NSObject, NSApplicationDelegate {
            let v = Meter(); var w: NSWindow?; var last = cpuNs(); var lastT = DispatchTime.now(); var keep = [Data](); var load = false
            func applicationDidFinishLaunching(_ n: Notification) {
              let level = Int(ProcessInfo.processInfo.environment["APP_LEVEL"] ?? "1") ?? 1
              for i in 0..<(level * 64) { keep.append(Data(repeating: UInt8(i % 251), count: 1048576)) }
              let win = NSWindow(contentRect: NSRect(x:80,y:80,width:760,height:300), styleMask: [.titled,.closable,.resizable], backing:.buffered, defer:false)
              win.title = "EnterpriseDownloadableLevel\(level) PID \(getpid())"
              let root = NSView(frame:NSRect(x:0,y:0,width:760,height:300)); v.frame = NSRect(x:180,y:20,width:560,height:260); root.addSubview(v)
              let b1 = NSButton(title:"Start CPU", target:self, action:#selector(start)); b1.frame=NSRect(x:20,y:210,width:130,height:32); root.addSubview(b1)
              let b2 = NSButton(title:"Stop CPU", target:self, action:#selector(stop)); b2.frame=NSRect(x:20,y:165,width:130,height:32); root.addSubview(b2)
              let b3 = NSButton(title:"+128 MB", target:self, action:#selector(addMem)); b3.frame=NSRect(x:20,y:120,width:130,height:32); root.addSubview(b3)
              win.contentView=root; win.makeKeyAndOrderFront(nil); w=win
              Timer.scheduledTimer(withTimeInterval:1,repeats:true){ _ in self.sample() }
            }
            func sample(){ let now=DispatchTime.now(); let c=cpuNs(); let wall=now.uptimeNanoseconds-lastT.uptimeNanoseconds; let pct=wall>0 ? Double(c-last)/Double(wall)*100 : 0; last=c; lastT=now; v.text=String(format:"%% CPU: %.1f\nMemory: %.1f MB\nPID: %d\nsource: task_vm_info.phys_footprint",pct,memMB(),getpid()); v.needsDisplay=true }
            @objc func start(){ if load { return }; load=true; DispatchQueue.global().async{ var x=0.0; while self.load { for i in 1...200000 { x += Double(i).squareRoot() }; if x > 1e12 { x=0 } } } }
            @objc func stop(){ load=false }
            @objc func addMem(){ for i in 0..<128 { keep.append(Data(repeating:UInt8(i), count:1048576)) } }
          }
          let app=NSApplication.shared; let d=D(); app.delegate=d; app.setActivationPolicy(.regular); app.run()
          SWIFT
          APP="EnterpriseDownloadableLevel${LEVEL}"
          ROOT="$PWD/$APP.app"
          mkdir -p "$ROOT/Contents/MacOS"
          cat > "$ROOT/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?><plist version="1.0"><dict><key>CFBundleExecutable</key><string>App</string><key>CFBundleIdentifier</key><string>com.wostgit.fixed.level${LEVEL}</string><key>CFBundleName</key><string>$APP</string><key>CFBundlePackageType</key><string>APPL</string><key>CFBundleShortVersionString</key><string>1.4.1</string><key>CFBundleVersion</key><string>6</string><key>NSPrincipalClass</key><string>NSApplication</string></dict></plist>
          PLIST
          xcrun swiftc app.swift -framework AppKit -O -o "$ROOT/Contents/MacOS/App"
          chmod +x "$ROOT/Contents/MacOS/App"
          codesign --force --deep --sign - "$ROOT"
          APP_LEVEL="$LEVEL" open -n "$ROOT"
          sleep 5
          screencapture -x "$OUT/$APP.preview.png" || true
          osascript -e 'tell application "'"$APP"'" to quit' || true
          ditto -c -k --sequesterRsrc --keepParent "$ROOT" "$OUT/$APP.app.zip"
          shasum -a 256 "$OUT/$APP.app.zip" > "$OUT/$APP.app.zip.sha256"
          BYTES=$(stat -f%z "$OUT/$APP.app.zip")
          SHA=$(awk '{print $1}' "$OUT/$APP.app.zip.sha256")
          python3 - <<PY
          import json
          open("$OUT/app.json","w").write(json.dumps({"level":int("$LEVEL"),"app_zip":"$OUT/$APP.app.zip","app_zip_bytes":int("$BYTES"),"sha256":"$SHA","preview":"$OUT/$APP.preview.png","version":"1.4.1","memory_source":"task_vm_info.phys_footprint"},indent=2))
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: apps-level-${{ matrix.level }}
          path: macos-enterprise-ui-downloadable-apps/

  aggregate:
    runs-on: ubuntu-latest
    needs: build
    if: always() && github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          pattern: apps-level-*
          path: downloaded
          merge-multiple: true
      - name: Commit apps
        run: |
          set -euxo pipefail
          rm -rf macos-enterprise-ui-downloadable-apps
          cp -R downloaded/macos-enterprise-ui-downloadable-apps macos-enterprise-ui-downloadable-apps
          python3 - <<'PY'
          import json
          from pathlib import Path
          root=Path('macos-enterprise-ui-downloadable-apps')
          rows=[json.loads(p.read_text()) for p in sorted(root.glob('**/app.json'))]
          with (root/'summary.md').open('w') as f:
            f.write('# macOS Enterprise UI Downloadable App Bundles\n\nVersion 1.4.1 uses task_vm_info.phys_footprint for Activity Monitor style Memory.\n\n')
            f.write('| Level | App zip | Size | SHA-256 | Preview |\n|---:|---|---:|---|---|\n')
            for r in rows:
              f.write(f"| {r['level']} | [{r['app_zip']}]({r['app_zip']}) | {r['app_zip_bytes']} | `{r['sha256']}` | [{r['preview']}]({r['preview']}) |\n")
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add macos-enterprise-ui-downloadable-apps/
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Add fixed downloadable app bundles"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
