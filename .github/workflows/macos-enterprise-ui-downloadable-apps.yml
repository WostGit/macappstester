name: macOS Enterprise UI Downloadable Apps

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - ".github/workflows/macos-enterprise-ui-downloadable-apps.yml"

permissions:
  contents: write
  actions: read

jobs:
  build-downloadable-apps:
    name: Build Activity Monitor matching app level ${{ matrix.level }}
    runs-on: macos-14
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        level: [1, 2, 3]

    env:
      LEVEL: ${{ matrix.level }}
      RESULT_DIR: macos-enterprise-ui-downloadable-apps/macos-14/level-${{ matrix.level }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build sealed signed app bundle
        run: |
          set -euxo pipefail
          mkdir -p "$RESULT_DIR"

          cat > EnterpriseDownloadableApp.swift <<'SWIFT'
          import AppKit
          import Foundation
          import Darwin

          struct ActivityMetrics {
              let cpuTimeNs: UInt64
              let activityMemoryMB: Double
              let rssMB: Double
              let virtualMB: Double
              let threads: Int32
              let runningThreads: Int32
          }

          func readActivityMetrics() -> ActivityMetrics {
              var task = proc_taskinfo()
              let taskBytes = proc_pidinfo(getpid(), Int32(PROC_PIDTASKINFO), 0, &task, Int32(MemoryLayout<proc_taskinfo>.stride))

              var usage = rusage_info_v4()
              let usageResult = proc_pid_rusage(getpid(), RUSAGE_INFO_V4, &usage)

              let cpuTime: UInt64
              let rss: Double
              let virt: Double
              let threadCount: Int32
              let runningCount: Int32

              if taskBytes > 0 {
                  cpuTime = UInt64(task.pti_total_user) + UInt64(task.pti_total_system)
                  rss = Double(task.pti_resident_size) / 1024.0 / 1024.0
                  virt = Double(task.pti_virtual_size) / 1024.0 / 1024.0
                  threadCount = task.pti_threadnum
                  runningCount = task.pti_numrunning
              } else {
                  cpuTime = 0
                  rss = -1
                  virt = -1
                  threadCount = 0
                  runningCount = 0
              }

              let footprint: Double
              if usageResult == 0 {
                  footprint = Double(usage.ri_phys_footprint) / 1024.0 / 1024.0
              } else {
                  footprint = rss
              }

              return ActivityMetrics(
                  cpuTimeNs: cpuTime,
                  activityMemoryMB: footprint,
                  rssMB: rss,
                  virtualMB: virt,
                  threads: threadCount,
                  runningThreads: runningCount
              )
          }

          final class LiveChartView: NSView {
              var cpuSamples: [Double] = []
              var memorySamples: [Double] = []
              var latestCPU: Double = 0
              var latestActivityMemory: Double = 0
              var latestRSS: Double = 0
              var latestVirtual: Double = 0
              var latestThreads: Int32 = 0
              var latestRunning: Int32 = 0
              var pid: Int32 = getpid()

              override var isFlipped: Bool { true }

              override func draw(_ dirtyRect: NSRect) {
                  super.draw(dirtyRect)
                  NSColor.windowBackgroundColor.setFill()
                  bounds.fill()

                  let titleAttrs: [NSAttributedString.Key: Any] = [.font: NSFont.boldSystemFont(ofSize: 18), .foregroundColor: NSColor.labelColor]
                  "Activity Monitor matching metrics".draw(at: NSPoint(x: 18, y: 14), withAttributes: titleAttrs)

                  let noteAttrs: [NSAttributedString.Key: Any] = [.font: NSFont.monospacedSystemFont(ofSize: 12, weight: .regular), .foregroundColor: NSColor.secondaryLabelColor]
                  "Search Activity Monitor for PID \(pid) or EnterpriseDownloadableApp. Memory uses physical footprint, not RSS.".draw(at: NSPoint(x: 18, y: 42), withAttributes: noteAttrs)

                  let valueAttrs: [NSAttributedString.Key: Any] = [.font: NSFont.monospacedDigitSystemFont(ofSize: 18, weight: .semibold), .foregroundColor: NSColor.labelColor]
                  String(format: "%% CPU: %.1f", latestCPU).draw(at: NSPoint(x: 18, y: 76), withAttributes: valueAttrs)
                  String(format: "Activity Monitor Memory: %.1f MB", latestActivityMemory).draw(at: NSPoint(x: 170, y: 76), withAttributes: valueAttrs)
                  String(format: "RSS: %.1f MB", latestRSS).draw(at: NSPoint(x: 560, y: 76), withAttributes: valueAttrs)

                  String(format: "Virtual: %.1f MB", latestVirtual).draw(at: NSPoint(x: 18, y: 108), withAttributes: valueAttrs)
                  "Threads: \(latestThreads)   Running: \(latestRunning)".draw(at: NSPoint(x: 280, y: 108), withAttributes: valueAttrs)

                  let plot = NSRect(x: 58, y: 155, width: bounds.width - 105, height: bounds.height - 225)
                  NSColor.separatorColor.setStroke()
                  NSBezierPath(rect: plot).stroke()

                  for i in 0...5 {
                      let y = plot.minY + CGFloat(i) * plot.height / 5
                      let line = NSBezierPath()
                      line.move(to: NSPoint(x: plot.minX, y: y))
                      line.line(to: NSPoint(x: plot.maxX, y: y))
                      NSColor.gridColor.setStroke()
                      line.stroke()
                  }

                  func makePath(values: [Double], maxValue: Double) -> NSBezierPath {
                      let path = NSBezierPath()
                      guard values.count >= 2 else { return path }
                      for (index, value) in values.enumerated() {
                          let x = plot.minX + CGFloat(index) * plot.width / CGFloat(max(values.count - 1, 1))
                          let clamped = max(0.0, min(value / maxValue, 1.0))
                          let y = plot.maxY - CGFloat(clamped) * plot.height
                          if index == 0 { path.move(to: NSPoint(x: x, y: y)) } else { path.line(to: NSPoint(x: x, y: y)) }
                      }
                      return path
                  }

                  let cpuAxis = max(100.0, ceil((cpuSamples.max() ?? 0) / 100.0) * 100.0)
                  let memoryAxis = max(256.0, ceil((memorySamples.max() ?? 0) / 256.0) * 256.0)

                  NSColor.systemBlue.setStroke()
                  let cpuPath = makePath(values: cpuSamples, maxValue: cpuAxis)
                  cpuPath.lineWidth = 3
                  cpuPath.stroke()

                  NSColor.systemRed.setStroke()
                  let memPath = makePath(values: memorySamples, maxValue: memoryAxis)
                  memPath.lineWidth = 3
                  memPath.stroke()

                  let legendAttrs: [NSAttributedString.Key: Any] = [.font: NSFont.monospacedSystemFont(ofSize: 13, weight: .medium), .foregroundColor: NSColor.labelColor]
                  "Blue: % CPU, axis max \(Int(cpuAxis))%".draw(at: NSPoint(x: 58, y: bounds.height - 42), withAttributes: legendAttrs)
                  "Red: Activity Monitor Memory, axis max \(Int(memoryAxis)) MB".draw(at: NSPoint(x: 310, y: bounds.height - 42), withAttributes: legendAttrs)
                  "Samples: \(cpuSamples.count)".draw(at: NSPoint(x: 720, y: bounds.height - 42), withAttributes: legendAttrs)
              }
          }

          final class AppDelegate: NSObject, NSApplicationDelegate, NSTableViewDataSource, NSTableViewDelegate {
              var window: NSWindow!
              var root = NSView()
              var content = NSView()
              var status = NSTextField(labelWithString: "Ready")
              var table = NSTableView()
              var chart = LiveChartView()
              var rows: [[String]] = []
              var baselineMemory: [Data] = []
              var workloadMemory: [Data] = []
              var level = 1
              var cpuWorkloadActive = false
              var lastMetrics = readActivityMetrics()
              var lastTime = DispatchTime.now()

              func applicationDidFinishLaunching(_ notification: Notification) {
                  level = Int(ProcessInfo.processInfo.environment["ENTERPRISE_APP_LEVEL"] ?? "1") ?? 1
                  buildData()
                  buildWindow()
                  showMetrics()
                  startSampling()
              }

              func buildData() {
                  let rowCount = level == 1 ? 10000 : (level == 2 ? 40000 : 100000)
                  let memoryMB = level == 1 ? 96 : (level == 2 ? 256 : 640)
                  for i in 0..<memoryMB { baselineMemory.append(Data(repeating: UInt8(i % 251), count: 1024 * 1024)) }
                  rows = (0..<rowCount).map { i in
                      ["USR-\(i)", "Enterprise User \(i)", i % 4 == 0 ? "Admin" : "Standard", i % 9 == 0 ? "Review" : "Active", "Device-\(i % 17000)"]
                  }
              }

              func buildWindow() {
                  window = NSWindow(contentRect: NSRect(x: 70, y: 80, width: 1320, height: 850), styleMask: [.titled, .closable, .resizable, .miniaturizable], backing: .buffered, defer: false)
                  window.title = "Activity Monitor Match - EnterpriseDownloadableApp - PID \(getpid()) - Level \(level)"
                  window.minSize = NSSize(width: 1100, height: 720)

                  root = NSView(frame: NSRect(x: 0, y: 0, width: 1320, height: 850))
                  let sidebar = NSBox(frame: NSRect(x: 16, y: 54, width: 245, height: 770))
                  sidebar.title = "Controls"
                  root.addSubview(sidebar)

                  addButton("Live metrics", y: 690, action: #selector(showMetrics), parent: sidebar.contentView!)
                  addButton("Users table", y: 640, action: #selector(showUsers), parent: sidebar.contentView!)
                  addButton("Start CPU load", y: 570, action: #selector(startCPULoad), parent: sidebar.contentView!)
                  addButton("Stop CPU load", y: 520, action: #selector(stopCPULoad), parent: sidebar.contentView!)
                  addButton("Allocate +128 MB", y: 450, action: #selector(allocateMemory), parent: sidebar.contentView!)
                  addButton("Free extra memory", y: 400, action: #selector(freeMemory), parent: sidebar.contentView!)
                  addButton("Shuffle table", y: 330, action: #selector(shuffleTable), parent: sidebar.contentView!)

                  status.frame = NSRect(x: 280, y: 18, width: 980, height: 24)
                  status.font = NSFont.monospacedSystemFont(ofSize: 12, weight: .regular)
                  root.addSubview(status)

                  content = NSView(frame: NSRect(x: 280, y: 54, width: 1000, height: 770))
                  root.addSubview(content)
                  window.contentView = root
                  window.makeKeyAndOrderFront(nil)
              }

              func addButton(_ title: String, y: CGFloat, action: Selector, parent: NSView) {
                  let button = NSButton(title: title, target: self, action: action)
                  button.frame = NSRect(x: 18, y: y, width: 200, height: 34)
                  button.bezelStyle = .rounded
                  parent.addSubview(button)
              }

              func clearContent() { content.subviews.forEach { $0.removeFromSuperview() } }

              func label(_ text: String, _ frame: NSRect, bold: Bool = false, size: CGFloat = 13) -> NSTextField {
                  let field = NSTextField(labelWithString: text)
                  field.frame = frame
                  field.font = bold ? NSFont.boldSystemFont(ofSize: size) : NSFont.systemFont(ofSize: size)
                  return field
              }

              @objc func showMetrics() {
                  clearContent()
                  chart = LiveChartView(frame: NSRect(x: 0, y: 20, width: 980, height: 730))
                  content.addSubview(chart)
                  status.stringValue = "Open Activity Monitor, search PID \(getpid()). Compare % CPU and Memory. Memory here uses physical footprint."
              }

              @objc func showUsers() {
                  clearContent()
                  content.addSubview(label("Users and access table", NSRect(x: 0, y: 720, width: 600, height: 30), bold: true, size: 24))
                  let scroll = NSScrollView(frame: NSRect(x: 0, y: 70, width: 950, height: 620))
                  table = NSTableView(frame: scroll.bounds)
                  let cols = [("id", "User ID", 140), ("name", "Name", 260), ("role", "Role", 150), ("status", "Status", 150), ("device", "Device", 190)]
                  for c in cols {
                      let col = NSTableColumn(identifier: NSUserInterfaceItemIdentifier(c.0))
                      col.title = c.1
                      col.width = CGFloat(c.2)
                      table.addTableColumn(col)
                  }
                  table.delegate = self
                  table.dataSource = self
                  table.usesAlternatingRowBackgroundColors = true
                  scroll.documentView = table
                  scroll.hasVerticalScroller = true
                  scroll.hasHorizontalScroller = true
                  content.addSubview(scroll)
                  table.reloadData()
                  status.stringValue = "Table view: \(rows.count) rows loaded."
              }

              func startSampling() {
                  lastMetrics = readActivityMetrics()
                  lastTime = DispatchTime.now()
                  Timer.scheduledTimer(withTimeInterval: 1.0, repeats: true) { _ in
                      let now = DispatchTime.now()
                      let current = readActivityMetrics()
                      let wallNs = now.uptimeNanoseconds - self.lastTime.uptimeNanoseconds
                      let cpuNs = current.cpuTimeNs >= self.lastMetrics.cpuTimeNs ? current.cpuTimeNs - self.lastMetrics.cpuTimeNs : 0
                      let cpuPercent = wallNs > 0 ? Double(cpuNs) / Double(wallNs) * 100.0 : 0.0

                      self.lastMetrics = current
                      self.lastTime = now

                      self.chart.latestCPU = cpuPercent
                      self.chart.latestActivityMemory = current.activityMemoryMB
                      self.chart.latestRSS = current.rssMB
                      self.chart.latestVirtual = current.virtualMB
                      self.chart.latestThreads = current.threads
                      self.chart.latestRunning = current.runningThreads
                      self.chart.cpuSamples.append(cpuPercent)
                      self.chart.memorySamples.append(current.activityMemoryMB)
                      if self.chart.cpuSamples.count > 90 { self.chart.cpuSamples.removeFirst() }
                      if self.chart.memorySamples.count > 90 { self.chart.memorySamples.removeFirst() }
                      self.chart.needsDisplay = true

                      self.status.stringValue = String(format: "PID %d | %% CPU %.1f | Activity Monitor Memory %.1f MB | RSS %.1f MB | Threads %d | Running %d", getpid(), cpuPercent, current.activityMemoryMB, current.rssMB, current.threads, current.runningThreads)
                  }
              }

              @objc func startCPULoad() {
                  guard !cpuWorkloadActive else { return }
                  cpuWorkloadActive = true
                  let workers = max(1, min(ProcessInfo.processInfo.processorCount, level + 1))
                  status.stringValue = "Started \(workers) CPU worker(s). Activity Monitor % CPU should rise."
                  for worker in 0..<workers {
                      DispatchQueue.global(qos: .userInitiated).async {
                          var x = Double(worker + 1)
                          while self.cpuWorkloadActive {
                              for i in 1...200_000 {
                                  x += sin(Double(i)) * cos(Double(i + worker)) / Double(i + 1)
                              }
                              if x.isNaN || x.isInfinite { x = Double(worker + 1) }
                          }
                      }
                  }
              }

              @objc func stopCPULoad() {
                  cpuWorkloadActive = false
                  status.stringValue = "Stopped CPU workers. Activity Monitor % CPU should fall after its next refresh."
              }

              @objc func allocateMemory() {
                  for i in 0..<128 { workloadMemory.append(Data(repeating: UInt8((i + workloadMemory.count) % 251), count: 1024 * 1024)) }
                  status.stringValue = "Allocated +128 MB. Activity Monitor Memory should rise."
              }

              @objc func freeMemory() {
                  workloadMemory.removeAll(keepingCapacity: false)
                  status.stringValue = "Freed extra workload memory. Memory may fall after allocator/OS accounting catches up."
              }

              @objc func shuffleTable() {
                  rows.shuffle()
                  table.reloadData()
                  status.stringValue = "Shuffled table data."
              }

              func numberOfRows(in tableView: NSTableView) -> Int { rows.count }
              func tableView(_ tableView: NSTableView, viewFor tableColumn: NSTableColumn?, row: Int) -> NSView? {
                  let id = tableColumn?.identifier.rawValue ?? "id"
                  let idx = ["id": 0, "name": 1, "role": 2, "status": 3, "device": 4][id] ?? 0
                  return NSTextField(labelWithString: rows[row][idx])
              }
          }

          let app = NSApplication.shared
          let delegate = AppDelegate()
          app.delegate = delegate
          app.setActivationPolicy(.regular)
          app.run()
          SWIFT

          APP_NAME="EnterpriseDownloadableLevel${LEVEL}"
          APP_ROOT="$PWD/${APP_NAME}.app"
          mkdir -p "$APP_ROOT/Contents/MacOS" "$APP_ROOT/Contents/Resources"

          cat > "$APP_ROOT/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key><string>EnterpriseDownloadableApp</string>
            <key>CFBundleIdentifier</key><string>com.wostgit.macappstester.downloadable.level${LEVEL}</string>
            <key>CFBundleName</key><string>${APP_NAME}</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleShortVersionString</key><string>1.4</string>
            <key>CFBundleVersion</key><string>5</string>
            <key>LSMinimumSystemVersion</key><string>13.0</string>
            <key>NSPrincipalClass</key><string>NSApplication</string>
          </dict>
          </plist>
          PLIST

          cat > "$APP_ROOT/Contents/Resources/README-OPENING.txt" <<README
          This app is ad-hoc signed, but not Apple-notarized.
          If macOS reports it as damaged after download, run:
            xattr -dr com.apple.quarantine "${APP_NAME}.app"
            open "${APP_NAME}.app"

          Activity Monitor comparison:
            1. Open this app.
            2. Open Activity Monitor.
            3. Search for EnterpriseDownloadableApp or the PID shown in the app title/status line.
            4. Compare % CPU and Memory.

          The app's main memory number uses rusage_info_v4.ri_phys_footprint, which should be much closer to Activity Monitor's Memory column than RSS.
          README

          xcrun swiftc EnterpriseDownloadableApp.swift -framework AppKit -O -o "$APP_ROOT/Contents/MacOS/EnterpriseDownloadableApp"
          chmod +x "$APP_ROOT/Contents/MacOS/EnterpriseDownloadableApp"
          codesign --force --deep --sign - "$APP_ROOT"
          codesign --verify --deep --strict --verbose=2 "$APP_ROOT"

          ENTERPRISE_APP_LEVEL="$LEVEL" open -n "$APP_ROOT"
          sleep 5
          screencapture -x "$RESULT_DIR/${APP_NAME}.preview.png" || true
          osascript -e 'tell application "'"${APP_NAME}"'" to quit' || true
          sleep 1
          pkill -f EnterpriseDownloadableApp || true

          ditto -c -k --sequesterRsrc --keepParent "$APP_ROOT" "$RESULT_DIR/${APP_NAME}.app.zip"
          shasum -a 256 "$RESULT_DIR/${APP_NAME}.app.zip" > "$RESULT_DIR/${APP_NAME}.app.zip.sha256"

          cat > "$RESULT_DIR/open-after-download.sh" <<SCRIPT
          #!/bin/zsh
          set -euo pipefail
          APP="${APP_NAME}.app"
          xattr -dr com.apple.quarantine "\$APP" 2>/dev/null || true
          open "\$APP"
          SCRIPT
          chmod +x "$RESULT_DIR/open-after-download.sh"

          ROWS=$(python3 - <<PY
          level=int("$LEVEL")
          print(100000 if level == 3 else (40000 if level == 2 else 10000))
          PY
          )
          MEMORY=$(python3 - <<PY
          level=int("$LEVEL")
          print(640 if level == 3 else (256 if level == 2 else 96))
          PY
          )
          BYTES=$(stat -f%z "$RESULT_DIR/${APP_NAME}.app.zip")
          SHA256=$(awk '{print $1}' "$RESULT_DIR/${APP_NAME}.app.zip.sha256")
          MACOS=$(sw_vers -productVersion)

          python3 - <<PY
          import json
          data = {
            "runner": "macos-14",
            "macOS": "$MACOS",
            "level": int("$LEVEL"),
            "rows": int("$ROWS"),
            "configured_memory_mb": int("$MEMORY"),
            "app_zip": "$RESULT_DIR/${APP_NAME}.app.zip",
            "app_zip_bytes": int("$BYTES"),
            "sha256": "$SHA256",
            "preview": "$RESULT_DIR/${APP_NAME}.preview.png",
            "open_script": "$RESULT_DIR/open-after-download.sh",
            "signature": "ad-hoc signed with codesign --sign -",
            "notarized": False,
            "features": ["Activity Monitor Memory uses physical footprint", "RSS also shown separately", "visible numeric CPU and memory labels", "live CPU and memory graph", "real CPU and memory workload controls"]
          }
          open("$RESULT_DIR/app.json", "w").write(json.dumps(data, indent=2, sort_keys=True))
          PY

      - name: Upload downloadable app artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-enterprise-ui-downloadable-apps-macos-14-level-${{ matrix.level }}
          path: macos-enterprise-ui-downloadable-apps/
          if-no-files-found: error

  aggregate-downloadable-apps:
    name: Aggregate and commit downloadable apps
    runs-on: ubuntu-latest
    needs: build-downloadable-apps
    if: always() && github.event_name != 'pull_request'
    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Download app artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: macos-enterprise-ui-downloadable-apps-*
          path: downloaded-apps
          merge-multiple: true

      - name: Aggregate app bundles
        run: |
          set -euxo pipefail
          rm -rf macos-enterprise-ui-downloadable-apps
          mkdir -p macos-enterprise-ui-downloadable-apps
          if [ -d downloaded-apps/macos-enterprise-ui-downloadable-apps ]; then
            cp -R downloaded-apps/macos-enterprise-ui-downloadable-apps/. macos-enterprise-ui-downloadable-apps/
          else
            cp -R downloaded-apps/. macos-enterprise-ui-downloadable-apps/ || true
          fi

          python3 - <<'PY'
          import json
          from pathlib import Path
          root = Path("macos-enterprise-ui-downloadable-apps")
          rows = [json.loads(p.read_text()) for p in sorted(root.glob("**/app.json"))]
          out = root / "summary.md"
          with out.open("w") as f:
              f.write("# macOS Enterprise UI Downloadable App Bundles\n\n")
              f.write(f"Total app bundles: {len(rows)}\n\n")
              f.write("Version 1.4 changes memory matching: the big memory number and red graph now use physical footprint from `proc_pid_rusage(...).ri_phys_footprint`, which should match Activity Monitor's Memory column far better than RSS. RSS is still shown separately for debugging.\n\n")
              f.write("| Runner | macOS | Level | Rows | Memory MB | App zip | Size bytes | SHA-256 | Preview | Open script |\n")
              f.write("|---|---|---:|---:|---:|---|---:|---|---|---|\n")
              for r in rows:
                  f.write(f"| {r['runner']} | {r['macOS']} | {r['level']} | {r['rows']} | {r['configured_memory_mb']} | [{r['app_zip']}]({r['app_zip']}) | {r['app_zip_bytes']} | `{r['sha256']}` | [{r['preview']}]({r['preview']}) | [{r['open_script']}]({r['open_script']}) |\n")
          print(out.read_text())
          PY
          cat macos-enterprise-ui-downloadable-apps/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Commit downloadable app bundles
        run: |
          set -euxo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add macos-enterprise-ui-downloadable-apps/
          if git diff --cached --quiet; then
            echo "No downloadable app changes to commit."
            exit 0
          fi
          git commit -m "Add Activity Monitor memory matching macOS app bundles"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
