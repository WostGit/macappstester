name: macOS Enterprise UI Downloadable Apps

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - ".github/workflows/macos-enterprise-ui-downloadable-apps.yml"

permissions:
  contents: write
  actions: read

jobs:
  build-downloadable-apps:
    name: Build real-time workload app level ${{ matrix.level }}
    runs-on: macos-14
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        level: [1, 2, 3]

    env:
      LEVEL: ${{ matrix.level }}
      RESULT_DIR: macos-enterprise-ui-downloadable-apps/macos-14/level-${{ matrix.level }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build sealed signed real-time app bundle
        run: |
          set -euxo pipefail
          mkdir -p "$RESULT_DIR"

          cat > EnterpriseDownloadableApp.swift <<'SWIFT'
          import AppKit
          import Foundation
          import Darwin

          func cpuSecondsUsed() -> Double {
              var usage = rusage()
              getrusage(RUSAGE_SELF, &usage)
              let user = Double(usage.ru_utime.tv_sec) + Double(usage.ru_utime.tv_usec) / 1_000_000.0
              let system = Double(usage.ru_stime.tv_sec) + Double(usage.ru_stime.tv_usec) / 1_000_000.0
              return user + system
          }

          func residentMemoryMB() -> Double {
              var info = mach_task_basic_info()
              var count = mach_msg_type_number_t(MemoryLayout<mach_task_basic_info>.size / MemoryLayout<natural_t>.size)
              let result = withUnsafeMutablePointer(to: &info) { pointer in
                  pointer.withMemoryRebound(to: integer_t.self, capacity: Int(count)) { rebound in
                      task_info(mach_task_self_, task_flavor_t(MACH_TASK_BASIC_INFO), rebound, &count)
                  }
              }
              if result != KERN_SUCCESS { return -1 }
              return Double(info.resident_size) / 1024.0 / 1024.0
          }

          final class MetricsChartView: NSView {
              var cpu: [Double] = []
              var rss: [Double] = []
              var ops: [Double] = []

              override var isFlipped: Bool { true }

              override func draw(_ dirtyRect: NSRect) {
                  super.draw(dirtyRect)
                  NSColor.windowBackgroundColor.setFill()
                  bounds.fill()

                  let titleAttrs: [NSAttributedString.Key: Any] = [.font: NSFont.boldSystemFont(ofSize: 17), .foregroundColor: NSColor.labelColor]
                  "Real-time process workload".draw(at: NSPoint(x: 16, y: 12), withAttributes: titleAttrs)

                  let subAttrs: [NSAttributedString.Key: Any] = [.font: NSFont.systemFont(ofSize: 12), .foregroundColor: NSColor.secondaryLabelColor]
                  "Blue = real CPU % from getrusage deltas. Red = real resident memory from Mach task_info.".draw(at: NSPoint(x: 16, y: 36), withAttributes: subAttrs)

                  let plot = NSRect(x: 56, y: 72, width: bounds.width - 96, height: bounds.height - 130)
                  NSColor.separatorColor.setStroke()
                  NSBezierPath(rect: plot).stroke()

                  for i in 0...4 {
                      let y = plot.minY + CGFloat(i) * plot.height / 4
                      let line = NSBezierPath()
                      line.move(to: NSPoint(x: plot.minX, y: y))
                      line.line(to: NSPoint(x: plot.maxX, y: y))
                      NSColor.gridColor.setStroke()
                      line.stroke()
                  }

                  func makePath(_ values: [Double], maxValue: Double) -> NSBezierPath {
                      let path = NSBezierPath()
                      guard values.count > 1 else { return path }
                      for (index, value) in values.enumerated() {
                          let x = plot.minX + CGFloat(index) * plot.width / CGFloat(max(values.count - 1, 1))
                          let y = plot.maxY - CGFloat(min(value / maxValue, 1.0)) * plot.height
                          if index == 0 { path.move(to: NSPoint(x: x, y: y)) } else { path.line(to: NSPoint(x: x, y: y)) }
                      }
                      return path
                  }

                  let cpuMax = max(100.0, (cpu.max() ?? 0) * 1.25)
                  let rssMax = max(256.0, (rss.max() ?? 0) * 1.15)

                  NSColor.systemBlue.setStroke()
                  let cpuPath = makePath(cpu, maxValue: cpuMax)
                  cpuPath.lineWidth = 3
                  cpuPath.stroke()

                  NSColor.systemRed.setStroke()
                  let rssPath = makePath(rss, maxValue: rssMax)
                  rssPath.lineWidth = 3
                  rssPath.stroke()

                  let legendAttrs: [NSAttributedString.Key: Any] = [.font: NSFont.systemFont(ofSize: 12), .foregroundColor: NSColor.labelColor]
                  "CPU axis max: \(Int(cpuMax))%".draw(at: NSPoint(x: 16, y: bounds.height - 44), withAttributes: legendAttrs)
                  "RSS axis max: \(Int(rssMax)) MB".draw(at: NSPoint(x: 160, y: bounds.height - 44), withAttributes: legendAttrs)
                  "Samples: \(cpu.count)".draw(at: NSPoint(x: 320, y: bounds.height - 44), withAttributes: legendAttrs)
              }
          }

          final class AppDelegate: NSObject, NSApplicationDelegate, NSTableViewDataSource, NSTableViewDelegate {
              var window: NSWindow!
              var root = NSView()
              var content = NSView()
              var status = NSTextField(labelWithString: "Ready")
              var cpuLabel = NSTextField(labelWithString: "CPU: --")
              var rssLabel = NSTextField(labelWithString: "RSS: --")
              var opsLabel = NSTextField(labelWithString: "Ops: --")
              var table = NSTableView()
              var chart = MetricsChartView()
              var rows: [[String]] = []
              var memory: [Data] = []
              var workloadMemory: [Data] = []
              var level = 1
              var tick = 0
              var workloadActive = false
              var operationCounter: UInt64 = 0
              var lastCPUSeconds = cpuSecondsUsed()
              var lastWallTime = Date()
              var lastOps: UInt64 = 0

              func applicationDidFinishLaunching(_ notification: Notification) {
                  level = Int(ProcessInfo.processInfo.environment["ENTERPRISE_APP_LEVEL"] ?? "1") ?? 1
                  buildData()
                  buildWindow()
                  showMetrics()
                  startMetricSampler()
              }

              func buildData() {
                  let rowCount = level == 1 ? 10000 : (level == 2 ? 40000 : 100000)
                  let memoryMB = level == 1 ? 96 : (level == 2 ? 256 : 640)
                  for i in 0..<memoryMB { memory.append(Data(repeating: UInt8(i % 251), count: 1024 * 1024)) }
                  rows = (0..<rowCount).map { i in
                      ["USR-\(i)", "Enterprise User \(i)", i % 4 == 0 ? "Admin" : "Standard", i % 9 == 0 ? "Review" : "Active", "Device-\(i % 17000)"]
                  }
              }

              func buildWindow() {
                  window = NSWindow(contentRect: NSRect(x: 70, y: 80, width: 1240, height: 800), styleMask: [.titled, .closable, .resizable, .miniaturizable], backing: .buffered, defer: false)
                  window.title = "Real-time Enterprise Workload Console - Level \(level)"
                  window.minSize = NSSize(width: 1000, height: 650)

                  root = NSView(frame: NSRect(x: 0, y: 0, width: 1240, height: 800))
                  root.autoresizingMask = [.width, .height]

                  let sidebar = NSBox(frame: NSRect(x: 16, y: 54, width: 220, height: 720))
                  sidebar.title = "Controls"
                  root.addSubview(sidebar)

                  addButton("Real-time metrics", y: 640, action: #selector(showMetrics), parent: sidebar.contentView!)
                  addButton("Users table", y: 590, action: #selector(showUsers), parent: sidebar.contentView!)
                  addButton("Start CPU workload", y: 520, action: #selector(startCPUWorkload), parent: sidebar.contentView!)
                  addButton("Stop CPU workload", y: 470, action: #selector(stopCPUWorkload), parent: sidebar.contentView!)
                  addButton("Allocate +128 MB", y: 400, action: #selector(allocateMemory), parent: sidebar.contentView!)
                  addButton("Free workload memory", y: 350, action: #selector(freeWorkloadMemory), parent: sidebar.contentView!)
                  addButton("Refresh table", y: 280, action: #selector(refreshData), parent: sidebar.contentView!)
                  addButton("Export CSV", y: 230, action: #selector(exportCSV), parent: sidebar.contentView!)

                  status.frame = NSRect(x: 260, y: 18, width: 900, height: 24)
                  root.addSubview(status)

                  content = NSView(frame: NSRect(x: 260, y: 54, width: 940, height: 720))
                  content.autoresizingMask = [.width, .height]
                  root.addSubview(content)

                  window.contentView = root
                  window.makeKeyAndOrderFront(nil)
              }

              func addButton(_ title: String, y: CGFloat, action: Selector, parent: NSView) {
                  let button = NSButton(title: title, target: self, action: action)
                  button.frame = NSRect(x: 18, y: y, width: 174, height: 34)
                  button.bezelStyle = .rounded
                  parent.addSubview(button)
              }

              func label(_ text: String, _ frame: NSRect, bold: Bool = false, size: CGFloat = 13) -> NSTextField {
                  let field = NSTextField(labelWithString: text)
                  field.frame = frame
                  field.font = bold ? NSFont.boldSystemFont(ofSize: size) : NSFont.systemFont(ofSize: size)
                  return field
              }

              func clearContent() { content.subviews.forEach { $0.removeFromSuperview() } }

              @objc func showMetrics() {
                  clearContent()
                  status.stringValue = "Real-time metrics selected. Press Start CPU workload or Allocate +128 MB."
                  content.addSubview(label("Real real-time workload metrics", NSRect(x: 0, y: 660, width: 650, height: 34), bold: true, size: 26))
                  content.addSubview(label("Measured inside this app process every second: CPU via getrusage, RSS via Mach task_info.", NSRect(x: 0, y: 628, width: 880, height: 22)))

                  cpuLabel.frame = NSRect(x: 0, y: 590, width: 220, height: 24)
                  rssLabel.frame = NSRect(x: 230, y: 590, width: 260, height: 24)
                  opsLabel.frame = NSRect(x: 500, y: 590, width: 260, height: 24)
                  content.addSubview(cpuLabel)
                  content.addSubview(rssLabel)
                  content.addSubview(opsLabel)

                  chart = MetricsChartView(frame: NSRect(x: 0, y: 90, width: 900, height: 480))
                  content.addSubview(chart)
              }

              @objc func showUsers() {
                  clearContent()
                  status.stringValue = "Users table selected: \(rows.count) rows"
                  content.addSubview(label("Users and access review", NSRect(x: 0, y: 660, width: 500, height: 32), bold: true, size: 24))
                  let search = NSSearchField(frame: NSRect(x: 660, y: 662, width: 230, height: 28))
                  search.stringValue = "status:active role:admin"
                  content.addSubview(search)
                  let scroll = NSScrollView(frame: NSRect(x: 0, y: 60, width: 900, height: 580))
                  table = NSTableView(frame: scroll.bounds)
                  let cols = [("id", "User ID", 140), ("name", "Name", 250), ("role", "Role", 140), ("status", "Status", 140), ("device", "Device", 180)]
                  for c in cols {
                      let col = NSTableColumn(identifier: NSUserInterfaceItemIdentifier(c.0))
                      col.title = c.1
                      col.width = CGFloat(c.2)
                      table.addTableColumn(col)
                  }
                  table.delegate = self
                  table.dataSource = self
                  table.usesAlternatingRowBackgroundColors = true
                  scroll.documentView = table
                  scroll.hasVerticalScroller = true
                  scroll.hasHorizontalScroller = true
                  content.addSubview(scroll)
                  table.reloadData()
              }

              func startMetricSampler() {
                  Timer.scheduledTimer(withTimeInterval: 1.0, repeats: true) { _ in
                      let now = Date()
                      let cpuNow = cpuSecondsUsed()
                      let wallDelta = now.timeIntervalSince(self.lastWallTime)
                      let cpuDelta = cpuNow - self.lastCPUSeconds
                      let cpuPercent = wallDelta > 0 ? max(0, cpuDelta / wallDelta * 100.0) : 0
                      let rss = residentMemoryMB()
                      let opsNow = self.operationCounter
                      let opsDelta = opsNow >= self.lastOps ? opsNow - self.lastOps : 0

                      self.lastWallTime = now
                      self.lastCPUSeconds = cpuNow
                      self.lastOps = opsNow

                      self.chart.cpu.append(cpuPercent)
                      self.chart.rss.append(rss)
                      self.chart.ops.append(Double(opsDelta))
                      if self.chart.cpu.count > 60 { self.chart.cpu.removeFirst() }
                      if self.chart.rss.count > 60 { self.chart.rss.removeFirst() }
                      if self.chart.ops.count > 60 { self.chart.ops.removeFirst() }
                      self.chart.needsDisplay = true

                      self.cpuLabel.stringValue = String(format: "CPU: %.1f%%", cpuPercent)
                      self.rssLabel.stringValue = String(format: "RSS: %.1f MB", rss)
                      self.opsLabel.stringValue = "Ops/s: \(opsDelta)"
                  }
              }

              @objc func startCPUWorkload() {
                  guard !workloadActive else { return }
                  workloadActive = true
                  status.stringValue = "CPU workload running on background queues"
                  let workers = max(1, min(ProcessInfo.processInfo.processorCount - 1, level + 1))
                  for worker in 0..<workers {
                      DispatchQueue.global(qos: .userInitiated).async {
                          var x = Double(worker + 1)
                          while self.workloadActive {
                              for i in 1...50_000 {
                                  x += sin(Double(i)) * cos(Double(i + worker)) / Double(i + 1)
                              }
                              self.operationCounter &+= 50_000
                              if x.isInfinite || x.isNaN { x = Double(worker + 1) }
                          }
                      }
                  }
              }

              @objc func stopCPUWorkload() {
                  workloadActive = false
                  status.stringValue = "CPU workload stopped"
              }

              @objc func allocateMemory() {
                  let blockCount = 128
                  for i in 0..<blockCount {
                      workloadMemory.append(Data(repeating: UInt8((i + workloadMemory.count) % 251), count: 1024 * 1024))
                  }
                  status.stringValue = "+128 MB allocated. Workload memory blocks: \(workloadMemory.count) MB"
              }

              @objc func freeWorkloadMemory() {
                  workloadMemory.removeAll(keepingCapacity: false)
                  status.stringValue = "Workload memory freed"
              }

              @objc func refreshData() {
                  rows.shuffle()
                  status.stringValue = "Data shuffled at \(Date())"
                  table.reloadData()
              }

              @objc func exportCSV() {
                  let path = NSTemporaryDirectory() + "enterprise-users-level-\(level).csv"
                  let csv = rows.prefix(1000).map { $0.joined(separator: ",") }.joined(separator: "\n")
                  try? csv.write(toFile: path, atomically: true, encoding: .utf8)
                  status.stringValue = "Exported first 1,000 rows to \(path)"
              }

              func numberOfRows(in tableView: NSTableView) -> Int { rows.count }
              func tableView(_ tableView: NSTableView, viewFor tableColumn: NSTableColumn?, row: Int) -> NSView? {
                  let id = tableColumn?.identifier.rawValue ?? "id"
                  let idx = ["id": 0, "name": 1, "role": 2, "status": 3, "device": 4][id] ?? 0
                  return NSTextField(labelWithString: rows[row][idx])
              }
          }

          let app = NSApplication.shared
          let delegate = AppDelegate()
          app.delegate = delegate
          app.setActivationPolicy(.regular)
          app.run()
          SWIFT

          APP_NAME="EnterpriseDownloadableLevel${LEVEL}"
          APP_ROOT="$PWD/${APP_NAME}.app"
          mkdir -p "$APP_ROOT/Contents/MacOS" "$APP_ROOT/Contents/Resources"

          cat > "$APP_ROOT/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key><string>EnterpriseDownloadableApp</string>
            <key>CFBundleIdentifier</key><string>com.wostgit.macappstester.downloadable.level${LEVEL}</string>
            <key>CFBundleName</key><string>${APP_NAME}</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleShortVersionString</key><string>1.2</string>
            <key>CFBundleVersion</key><string>3</string>
            <key>LSMinimumSystemVersion</key><string>13.0</string>
            <key>NSPrincipalClass</key><string>NSApplication</string>
          </dict>
          </plist>
          PLIST

          cat > "$APP_ROOT/Contents/Resources/README-OPENING.txt" <<README
          This app is ad-hoc signed, but not Apple-notarized.
          If macOS reports it as damaged after download, run:
            xattr -dr com.apple.quarantine "${APP_NAME}.app"
            open "${APP_NAME}.app"
          README

          xcrun swiftc EnterpriseDownloadableApp.swift -framework AppKit -O -o "$APP_ROOT/Contents/MacOS/EnterpriseDownloadableApp"
          chmod +x "$APP_ROOT/Contents/MacOS/EnterpriseDownloadableApp"
          codesign --force --deep --sign - "$APP_ROOT"
          codesign --verify --deep --strict --verbose=2 "$APP_ROOT"

          ENTERPRISE_APP_LEVEL="$LEVEL" open -n "$APP_ROOT"
          sleep 5
          screencapture -x "$RESULT_DIR/${APP_NAME}.preview.png" || true
          osascript -e 'tell application "'"${APP_NAME}"'" to quit' || true
          sleep 1
          pkill -f EnterpriseDownloadableApp || true

          ditto -c -k --sequesterRsrc --keepParent "$APP_ROOT" "$RESULT_DIR/${APP_NAME}.app.zip"
          shasum -a 256 "$RESULT_DIR/${APP_NAME}.app.zip" > "$RESULT_DIR/${APP_NAME}.app.zip.sha256"

          cat > "$RESULT_DIR/open-after-download.sh" <<SCRIPT
          #!/bin/zsh
          set -euo pipefail
          APP="${APP_NAME}.app"
          xattr -dr com.apple.quarantine "\$APP" 2>/dev/null || true
          open "\$APP"
          SCRIPT
          chmod +x "$RESULT_DIR/open-after-download.sh"

          ROWS=$(python3 - <<PY
          level=int("$LEVEL")
          print(100000 if level == 3 else (40000 if level == 2 else 10000))
          PY
          )
          MEMORY=$(python3 - <<PY
          level=int("$LEVEL")
          print(640 if level == 3 else (256 if level == 2 else 96))
          PY
          )
          BYTES=$(stat -f%z "$RESULT_DIR/${APP_NAME}.app.zip")
          SHA256=$(awk '{print $1}' "$RESULT_DIR/${APP_NAME}.app.zip.sha256")
          MACOS=$(sw_vers -productVersion)

          python3 - <<PY
          import json
          data = {
            "runner": "macos-14",
            "macOS": "$MACOS",
            "level": int("$LEVEL"),
            "rows": int("$ROWS"),
            "configured_memory_mb": int("$MEMORY"),
            "app_zip": "$RESULT_DIR/${APP_NAME}.app.zip",
            "app_zip_bytes": int("$BYTES"),
            "sha256": "$SHA256",
            "preview": "$RESULT_DIR/${APP_NAME}.preview.png",
            "open_script": "$RESULT_DIR/open-after-download.sh",
            "signature": "ad-hoc signed with codesign --sign -",
            "notarized": False,
            "features": ["real-time CPU from getrusage", "real RSS memory from Mach task_info", "start/stop real background CPU workload", "allocate/free real memory workload", "in-app live chart"]
          }
          open("$RESULT_DIR/app.json", "w").write(json.dumps(data, indent=2, sort_keys=True))
          PY

      - name: Upload downloadable app artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-enterprise-ui-downloadable-apps-macos-14-level-${{ matrix.level }}
          path: macos-enterprise-ui-downloadable-apps/
          if-no-files-found: error

  aggregate-downloadable-apps:
    name: Aggregate and commit downloadable apps
    runs-on: ubuntu-latest
    needs: build-downloadable-apps
    if: always() && github.event_name != 'pull_request'
    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Download app artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: macos-enterprise-ui-downloadable-apps-*
          path: downloaded-apps
          merge-multiple: true

      - name: Aggregate app bundles
        run: |
          set -euxo pipefail
          rm -rf macos-enterprise-ui-downloadable-apps
          mkdir -p macos-enterprise-ui-downloadable-apps
          if [ -d downloaded-apps/macos-enterprise-ui-downloadable-apps ]; then
            cp -R downloaded-apps/macos-enterprise-ui-downloadable-apps/. macos-enterprise-ui-downloadable-apps/
          else
            cp -R downloaded-apps/. macos-enterprise-ui-downloadable-apps/ || true
          fi

          python3 - <<'PY'
          import json
          from pathlib import Path
          root = Path("macos-enterprise-ui-downloadable-apps")
          rows = [json.loads(p.read_text()) for p in sorted(root.glob("**/app.json"))]
          out = root / "summary.md"
          with out.open("w") as f:
              f.write("# macOS Enterprise UI Downloadable App Bundles\n\n")
              f.write(f"Total app bundles: {len(rows)}\n\n")
              f.write("Version 1.2 shows real-time workload inside the app: CPU is measured from process getrusage deltas, RSS memory is measured with Mach task_info, and buttons start/stop actual compute and memory workloads. Apps are ad-hoc signed but not Apple-notarized. If macOS reports damaged, unzip and run `xattr -dr com.apple.quarantine EnterpriseDownloadableLevelX.app`.\n\n")
              f.write("| Runner | macOS | Level | Rows | Memory MB | App zip | Size bytes | SHA-256 | Preview | Open script |\n")
              f.write("|---|---|---:|---:|---:|---|---:|---|---|---|\n")
              for r in rows:
                  f.write(f"| {r['runner']} | {r['macOS']} | {r['level']} | {r['rows']} | {r['configured_memory_mb']} | [{r['app_zip']}]({r['app_zip']}) | {r['app_zip_bytes']} | `{r['sha256']}` | [{r['preview']}]({r['preview']}) | [{r['open_script']}]({r['open_script']}) |\n")
          print(out.read_text())
          PY
          cat macos-enterprise-ui-downloadable-apps/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Commit downloadable app bundles
        run: |
          set -euxo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add macos-enterprise-ui-downloadable-apps/
          if git diff --cached --quiet; then
            echo "No downloadable app changes to commit."
            exit 0
          fi
          git commit -m "Add real-time workload macOS enterprise app bundles"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
