name: macOS Enterprise UI Downloadable Apps

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - ".github/workflows/macos-enterprise-ui-downloadable-apps.yml"

permissions:
  contents: write
  actions: read

jobs:
  build-downloadable-apps:
    name: Build signed downloadable enterprise app ${{ matrix.macos }} level ${{ matrix.level }}
    runs-on: ${{ matrix.macos }}
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        macos: [macos-14]
        level: [1, 2, 3]

    env:
      LEVEL: ${{ matrix.level }}
      RESULT_DIR: macos-enterprise-ui-downloadable-apps/${{ matrix.macos }}/level-${{ matrix.level }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build, ad-hoc sign, zip, and test app bundle
        run: |
          set -euxo pipefail
          mkdir -p "$RESULT_DIR"

          cat > EnterpriseDownloadableApp.swift <<'SWIFT'
          import AppKit
          import Foundation

          final class AppDelegate: NSObject, NSApplicationDelegate, NSTableViewDataSource, NSTableViewDelegate {
              var window: NSWindow!
              var table = NSTableView()
              var rows: [[String]] = []
              var memory: [Data] = []
              var level = 1
              var tick = 0

              func applicationDidFinishLaunching(_ notification: Notification) {
                  level = Int(ProcessInfo.processInfo.environment["ENTERPRISE_APP_LEVEL"] ?? "1") ?? 1
                  buildData()
                  buildUI()
                  startActivity()
              }

              func buildData() {
                  let rowCount = level == 1 ? 10000 : (level == 2 ? 40000 : 100000)
                  let memoryMB = level == 1 ? 96 : (level == 2 ? 256 : 640)
                  for i in 0..<memoryMB {
                      memory.append(Data(repeating: UInt8(i % 251), count: 1024 * 1024))
                  }
                  rows = (0..<rowCount).map { i in
                      ["USR-\(i)", "Enterprise User \(i)", i % 4 == 0 ? "Admin" : "Standard", i % 9 == 0 ? "Review" : "Active", "Device-\(i % 17000)"]
                  }
              }

              func label(_ text: String, _ frame: NSRect, bold: Bool = false, size: CGFloat = 13) -> NSTextField {
                  let field = NSTextField(labelWithString: text)
                  field.frame = frame
                  field.font = bold ? NSFont.boldSystemFont(ofSize: size) : NSFont.systemFont(ofSize: size)
                  return field
              }

              func buildUI() {
                  window = NSWindow(contentRect: NSRect(x: 70, y: 80, width: 1220, height: 780), styleMask: [.titled, .closable, .resizable, .miniaturizable], backing: .buffered, defer: false)
                  window.title = "Downloadable Enterprise Admin Console - Level \(level)"
                  window.minSize = NSSize(width: 900, height: 600)

                  let root = NSView(frame: NSRect(x: 0, y: 0, width: 1220, height: 780))

                  let sidebar = NSBox(frame: NSRect(x: 18, y: 18, width: 210, height: 734))
                  sidebar.title = "Navigation"
                  let nav = ["Dashboard", "Users", "Devices", "Policies", "Audit", "Reports", "Settings"]
                  for (i, item) in nav.enumerated() {
                      sidebar.contentView?.addSubview(label(item, NSRect(x: 18, y: 650 - CGFloat(i * 42), width: 160, height: 24), bold: i == 1))
                  }
                  root.addSubview(sidebar)

                  root.addSubview(label("Enterprise Admin Workload App", NSRect(x: 260, y: 720, width: 620, height: 32), bold: true, size: 24))
                  root.addSubview(label("Rows: \(rows.count)   Memory allocation: \(memory.count) MB   Workload level: \(level)", NSRect(x: 260, y: 690, width: 820, height: 22)))

                  let cards = [("Users", "\(rows.count)"), ("Devices", "17K"), ("Open reviews", "\(rows.count / 9)"), ("Admins", "\(rows.count / 4)")]
                  for (i, card) in cards.enumerated() {
                      let box = NSBox(frame: NSRect(x: 260 + CGFloat(i) * 225, y: 600, width: 205, height: 76))
                      box.title = card.0
                      box.contentView?.addSubview(label(card.1, NSRect(x: 18, y: 20, width: 160, height: 30), bold: true, size: 24))
                      root.addSubview(box)
                  }

                  let search = NSSearchField(frame: NSRect(x: 930, y: 718, width: 230, height: 28))
                  search.stringValue = "status:active role:admin"
                  root.addSubview(search)

                  let scroll = NSScrollView(frame: NSRect(x: 260, y: 70, width: 900, height: 510))
                  let columns = [("id", "User ID", 140), ("name", "Name", 250), ("role", "Role", 140), ("status", "Status", 140), ("device", "Device", 180)]
                  for c in columns {
                      let col = NSTableColumn(identifier: NSUserInterfaceItemIdentifier(c.0))
                      col.title = c.1
                      col.width = CGFloat(c.2)
                      table.addTableColumn(col)
                  }
                  table.delegate = self
                  table.dataSource = self
                  table.usesAlternatingRowBackgroundColors = true
                  scroll.documentView = table
                  scroll.hasVerticalScroller = true
                  scroll.hasHorizontalScroller = true
                  root.addSubview(scroll)

                  let progress = NSProgressIndicator(frame: NSRect(x: 260, y: 35, width: 900, height: 18))
                  progress.isIndeterminate = true
                  progress.startAnimation(nil)
                  root.addSubview(progress)

                  window.contentView = root
                  window.makeKeyAndOrderFront(nil)
              }

              func startActivity() {
                  Timer.scheduledTimer(withTimeInterval: 0.25, repeats: true) { _ in
                      self.tick += 1
                      if self.rows.count > 0 {
                          let row = (self.tick * 997) % self.rows.count
                          self.table.scrollRowToVisible(row)
                          self.table.selectRowIndexes(IndexSet(integer: row), byExtendingSelection: false)
                      }
                      _ = self.rows.prefix(1000 + self.level * 3000).filter { $0[3] == "Active" }.count
                      self.window.contentView?.needsDisplay = true
                  }
              }

              func numberOfRows(in tableView: NSTableView) -> Int { rows.count }

              func tableView(_ tableView: NSTableView, viewFor tableColumn: NSTableColumn?, row: Int) -> NSView? {
                  let id = tableColumn?.identifier.rawValue ?? "id"
                  let idx = ["id": 0, "name": 1, "role": 2, "status": 3, "device": 4][id] ?? 0
                  return NSTextField(labelWithString: rows[row][idx])
              }
          }

          let app = NSApplication.shared
          let delegate = AppDelegate()
          app.delegate = delegate
          app.setActivationPolicy(.regular)
          app.run()
          SWIFT

          APP_NAME="EnterpriseDownloadableLevel${LEVEL}"
          APP_ROOT="$PWD/${APP_NAME}.app"
          mkdir -p "$APP_ROOT/Contents/MacOS"
          mkdir -p "$APP_ROOT/Contents/Resources"

          cat > "$APP_ROOT/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key><string>EnterpriseDownloadableApp</string>
            <key>CFBundleIdentifier</key><string>com.wostgit.macappstester.downloadable.level${LEVEL}</string>
            <key>CFBundleName</key><string>${APP_NAME}</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleShortVersionString</key><string>1.0</string>
            <key>CFBundleVersion</key><string>1</string>
            <key>LSMinimumSystemVersion</key><string>13.0</string>
            <key>NSPrincipalClass</key><string>NSApplication</string>
          </dict>
          </plist>
          PLIST

          cat > "$APP_ROOT/README-OPENING.txt" <<README
          This test app is ad-hoc signed, but it is not notarized with an Apple Developer ID.

          If macOS says the app is damaged or cannot be opened after download, remove the download quarantine attribute:

            xattr -dr com.apple.quarantine "${APP_NAME}.app"
            open "${APP_NAME}.app"

          This is expected for unsigned/notarization-free test builds downloaded from GitHub.
          README

          xcrun swiftc EnterpriseDownloadableApp.swift -framework AppKit -O -o "$APP_ROOT/Contents/MacOS/EnterpriseDownloadableApp"
          chmod +x "$APP_ROOT/Contents/MacOS/EnterpriseDownloadableApp"

          # Ad-hoc sign the bundle so Gatekeeper sees a coherent code signature.
          codesign --force --deep --sign - "$APP_ROOT"
          codesign --verify --deep --strict --verbose=2 "$APP_ROOT"

          # Verify the app can launch on the runner before zipping.
          ENTERPRISE_APP_LEVEL="$LEVEL" open -n "$APP_ROOT"
          sleep 4
          screencapture -x "$RESULT_DIR/${APP_NAME}.preview.png" || true
          osascript -e 'tell application "'"${APP_NAME}"'" to quit' || true
          sleep 1
          pkill -f EnterpriseDownloadableApp || true

          # Preserve the .app bundle structure and resource forks.
          ditto -c -k --sequesterRsrc --keepParent "$APP_ROOT" "$RESULT_DIR/${APP_NAME}.app.zip"
          shasum -a 256 "$RESULT_DIR/${APP_NAME}.app.zip" > "$RESULT_DIR/${APP_NAME}.app.zip.sha256"

          cat > "$RESULT_DIR/open-after-download.sh" <<SCRIPT
          #!/bin/zsh
          set -euo pipefail
          APP="${APP_NAME}.app"
          xattr -dr com.apple.quarantine "\$APP" 2>/dev/null || true
          open "\$APP"
          SCRIPT
          chmod +x "$RESULT_DIR/open-after-download.sh"

          ROWS=$(python3 - <<PY
          level=int("$LEVEL")
          print(100000 if level == 3 else (40000 if level == 2 else 10000))
          PY
          )
          MEMORY=$(python3 - <<PY
          level=int("$LEVEL")
          print(640 if level == 3 else (256 if level == 2 else 96))
          PY
          )
          BYTES=$(stat -f%z "$RESULT_DIR/${APP_NAME}.app.zip")
          SHA256=$(awk '{print $1}' "$RESULT_DIR/${APP_NAME}.app.zip.sha256")
          MACOS=$(sw_vers -productVersion)

          python3 - <<PY
          import json
          data = {
            "runner": "${{ matrix.macos }}",
            "macOS": "$MACOS",
            "level": int("$LEVEL"),
            "rows": int("$ROWS"),
            "configured_memory_mb": int("$MEMORY"),
            "app_zip": "$RESULT_DIR/${APP_NAME}.app.zip",
            "app_zip_bytes": int("$BYTES"),
            "sha256": "$SHA256",
            "preview": "$RESULT_DIR/${APP_NAME}.preview.png",
            "open_script": "$RESULT_DIR/open-after-download.sh",
            "signature": "ad-hoc signed with codesign --sign -",
            "notarized": False,
            "quarantine_note": "If macOS reports damaged, run xattr -dr com.apple.quarantine on the .app after unzipping."
          }
          open("$RESULT_DIR/app.json", "w").write(json.dumps(data, indent=2, sort_keys=True))
          PY

      - name: Upload downloadable app artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-enterprise-ui-downloadable-apps-${{ matrix.macos }}-level-${{ matrix.level }}
          path: macos-enterprise-ui-downloadable-apps/
          if-no-files-found: error

  aggregate-downloadable-apps:
    name: Aggregate and commit downloadable apps
    runs-on: ubuntu-latest
    needs: build-downloadable-apps
    if: always() && github.event_name != 'pull_request'
    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Download app artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: macos-enterprise-ui-downloadable-apps-*
          path: downloaded-apps
          merge-multiple: true

      - name: Aggregate app bundles
        run: |
          set -euxo pipefail
          rm -rf macos-enterprise-ui-downloadable-apps
          mkdir -p macos-enterprise-ui-downloadable-apps

          if [ -d downloaded-apps/macos-enterprise-ui-downloadable-apps ]; then
            cp -R downloaded-apps/macos-enterprise-ui-downloadable-apps/. macos-enterprise-ui-downloadable-apps/
          else
            cp -R downloaded-apps/. macos-enterprise-ui-downloadable-apps/ || true
          fi

          python3 - <<'PY'
          import json
          from pathlib import Path
          root = Path("macos-enterprise-ui-downloadable-apps")
          rows = [json.loads(p.read_text()) for p in sorted(root.glob("**/app.json"))]
          out = root / "summary.md"
          with out.open("w") as f:
              f.write("# macOS Enterprise UI Downloadable App Bundles\n\n")
              f.write(f"Total app bundles: {len(rows)}\n\n")
              f.write("These apps are ad-hoc signed for test use, but they are not Apple-notarized. If macOS reports an app is damaged after download, unzip it and run `xattr -dr com.apple.quarantine EnterpriseDownloadableLevelX.app`, or use the included `open-after-download.sh`.\n\n")
              f.write("| Runner | macOS | Level | Rows | Memory MB | App zip | Size bytes | SHA-256 | Preview | Open script |\n")
              f.write("|---|---|---:|---:|---:|---|---:|---|---|---|\n")
              for r in rows:
                  f.write(
                      f"| {r['runner']} | {r['macOS']} | {r['level']} | {r['rows']} | {r['configured_memory_mb']} | "
                      f"[{r['app_zip']}]({r['app_zip']}) | {r['app_zip_bytes']} | `{r['sha256']}` | [{r['preview']}]({r['preview']}) | [{r['open_script']}]({r['open_script']}) |\n"
                  )
          print(out.read_text())
          PY
          cat macos-enterprise-ui-downloadable-apps/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Commit downloadable app bundles
        run: |
          set -euxo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add macos-enterprise-ui-downloadable-apps/
          if git diff --cached --quiet; then
            echo "No downloadable app changes to commit."
            exit 0
          fi
          git commit -m "Add ad-hoc signed downloadable macOS app bundles"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
