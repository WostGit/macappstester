name: macOS Enterprise UI Incremental Metrics

on:
  workflow_dispatch:
    inputs:
      sample_seconds:
        description: "How long to sample each run"
        required: true
        default: "14"
  push:
    branches: [main, master]
    paths:
      - ".github/workflows/macos-enterprise-ui-incremental-metrics.yml"

permissions:
  contents: write
  actions: read

jobs:
  incremental-metrics:
    name: Metrics ${{ matrix.macos }} level ${{ matrix.level }}
    runs-on: ${{ matrix.macos }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        macos: [macos-14]
        level: [1, 2, 3]

    env:
      LEVEL: ${{ matrix.level }}
      SAMPLE_SECONDS: ${{ github.event.inputs.sample_seconds || '14' }}
      RESULT_DIR: macos-enterprise-ui-metrics-results/${{ matrix.macos }}/level-${{ matrix.level }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build enterprise metrics app
        run: |
          set -euxo pipefail
          mkdir -p "$RESULT_DIR"

          cat > EnterpriseMetricsApp.swift <<'SWIFT'
          import AppKit
          import Foundation

          final class AppDelegate: NSObject, NSApplicationDelegate, NSTableViewDataSource, NSTableViewDelegate {
              var window: NSWindow!
              var table = NSTableView()
              var rows: [[String]] = []
              var memory: [Data] = []
              var level = 1
              var tick = 0

              func applicationDidFinishLaunching(_ notification: Notification) {
                  level = Int(ProcessInfo.processInfo.environment["METRICS_LEVEL"] ?? "1") ?? 1
                  buildWorkload()
                  buildUI()
                  startWork()
              }

              func buildWorkload() {
                  let rowCount = level == 1 ? 10000 : (level == 2 ? 40000 : 100000)
                  let memoryMB = level == 1 ? 96 : (level == 2 ? 256 : 640)
                  for i in 0..<memoryMB {
                      memory.append(Data(repeating: UInt8(i % 251), count: 1024 * 1024))
                  }
                  rows = (0..<rowCount).map { i in
                      ["USR-\(i)", "Enterprise User \(i)", i % 4 == 0 ? "Admin" : "Standard", i % 9 == 0 ? "Review" : "Active", "Device-\(i % 17000)"]
                  }
              }

              func label(_ s: String, _ frame: NSRect, bold: Bool = false, size: CGFloat = 13) -> NSTextField {
                  let f = NSTextField(labelWithString: s)
                  f.frame = frame
                  f.font = bold ? NSFont.boldSystemFont(ofSize: size) : NSFont.systemFont(ofSize: size)
                  return f
              }

              func buildUI() {
                  window = NSWindow(contentRect: NSRect(x: 70, y: 80, width: 1220, height: 780), styleMask: [.titled, .closable, .resizable, .miniaturizable], backing: .buffered, defer: false)
                  window.title = "Enterprise Metrics Console - Level \(level)"
                  let root = NSView(frame: NSRect(x: 0, y: 0, width: 1220, height: 780))

                  let sidebar = NSBox(frame: NSRect(x: 18, y: 18, width: 210, height: 734))
                  sidebar.title = "Navigation"
                  let nav = ["Dashboard", "Users", "Devices", "Policies", "Audit", "Reports", "Settings"]
                  for (i, item) in nav.enumerated() {
                      sidebar.contentView?.addSubview(label(item, NSRect(x: 18, y: 650 - CGFloat(i * 42), width: 160, height: 24), bold: i == 1))
                  }
                  root.addSubview(sidebar)

                  root.addSubview(label("Enterprise Admin Workload Metrics", NSRect(x: 260, y: 720, width: 620, height: 32), bold: true, size: 24))
                  root.addSubview(label("Rows: \(rows.count)   Memory allocation: \(memory.count) MB   Workload level: \(level)", NSRect(x: 260, y: 690, width: 800, height: 22)))

                  let search = NSSearchField(frame: NSRect(x: 930, y: 718, width: 230, height: 28))
                  search.stringValue = "status:active role:admin"
                  root.addSubview(search)

                  let scroll = NSScrollView(frame: NSRect(x: 260, y: 70, width: 900, height: 600))
                  let columns = [("id", "User ID", 140), ("name", "Name", 250), ("role", "Role", 140), ("status", "Status", 140), ("device", "Device", 180)]
                  for c in columns {
                      let col = NSTableColumn(identifier: NSUserInterfaceItemIdentifier(c.0))
                      col.title = c.1; col.width = CGFloat(c.2)
                      table.addTableColumn(col)
                  }
                  table.delegate = self; table.dataSource = self
                  table.usesAlternatingRowBackgroundColors = true
                  scroll.documentView = table; scroll.hasVerticalScroller = true; scroll.hasHorizontalScroller = true
                  root.addSubview(scroll)

                  let progress = NSProgressIndicator(frame: NSRect(x: 260, y: 35, width: 900, height: 18))
                  progress.isIndeterminate = true
                  progress.startAnimation(nil)
                  root.addSubview(progress)

                  window.contentView = root
                  window.makeKeyAndOrderFront(nil)
              }

              func startWork() {
                  Timer.scheduledTimer(withTimeInterval: 0.25, repeats: true) { _ in
                      self.tick += 1
                      if self.rows.count > 0 {
                          let row = (self.tick * 997) % self.rows.count
                          self.table.scrollRowToVisible(row)
                          self.table.selectRowIndexes(IndexSet(integer: row), byExtendingSelection: false)
                      }
                      _ = self.rows.prefix(1000 + self.level * 3000).filter { $0[3] == "Active" }.count
                      self.window.contentView?.needsDisplay = true
                  }
                  let duration = Double(ProcessInfo.processInfo.environment["METRICS_DURATION"] ?? "18") ?? 18
                  DispatchQueue.main.asyncAfter(deadline: .now() + duration) { NSApp.terminate(nil) }
              }

              func numberOfRows(in tableView: NSTableView) -> Int { rows.count }
              func tableView(_ tableView: NSTableView, viewFor tableColumn: NSTableColumn?, row: Int) -> NSView? {
                  let id = tableColumn?.identifier.rawValue ?? "id"
                  let idx = ["id": 0, "name": 1, "role": 2, "status": 3, "device": 4][id] ?? 0
                  return NSTextField(labelWithString: rows[row][idx])
              }
          }

          let app = NSApplication.shared
          let delegate = AppDelegate()
          app.delegate = delegate
          app.setActivationPolicy(.regular)
          app.run()
          SWIFT

          APP_ROOT="$PWD/EnterpriseMetricsLevel${LEVEL}.app"
          mkdir -p "$APP_ROOT/Contents/MacOS"
          cat > "$APP_ROOT/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundleExecutable</key><string>EnterpriseMetricsApp</string>
            <key>CFBundleIdentifier</key><string>com.wostgit.macappstester.metrics.level${LEVEL}</string>
            <key>CFBundleName</key><string>EnterpriseMetricsLevel${LEVEL}</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleShortVersionString</key><string>1.0</string>
            <key>CFBundleVersion</key><string>1</string>
            <key>NSPrincipalClass</key><string>NSApplication</string>
          </dict></plist>
          PLIST

          xcrun swiftc EnterpriseMetricsApp.swift -framework AppKit -O -o "$APP_ROOT/Contents/MacOS/EnterpriseMetricsApp"

      - name: Run incremental workload and sample CPU/RSS
        run: |
          set -euxo pipefail
          mkdir -p "$RESULT_DIR"
          APP="$PWD/EnterpriseMetricsLevel${LEVEL}.app"
          CSV="$RESULT_DIR/metrics.csv"
          JSON="$RESULT_DIR/run.json"
          LOG="$RESULT_DIR/run.log"
          SCREENSHOT="$RESULT_DIR/screenshot.png"

          {
            echo "# Environment"
            sw_vers
            uname -a
            xcodebuild -version || true
          } | tee "$RESULT_DIR/environment.txt"

          ENTERPRISE_DURATION=$((SAMPLE_SECONDS + 6)) METRICS_LEVEL="$LEVEL" METRICS_DURATION=$((SAMPLE_SECONDS + 6)) open -n "$APP"
          sleep 2
          PID=$(pgrep -n EnterpriseMetricsApp)
          echo "pid=$PID" | tee "$LOG"

          echo "second,cpu_percent,rss_mb" > "$CSV"
          for second in $(seq 1 "$SAMPLE_SECONDS"); do
            VALUES=$(ps -p "$PID" -o %cpu= -o rss= || true)
            CPU=$(echo "$VALUES" | awk '{print $1+0}')
            RSS_KB=$(echo "$VALUES" | awk '{print $2+0}')
            RSS_MB=$(python3 - <<PY
          print(round($RSS_KB / 1024, 3))
          PY
          )
            echo "$second,$CPU,$RSS_MB" >> "$CSV"
            if [ "$second" -eq 4 ]; then
              screencapture -x "$SCREENSHOT" || true
            fi
            sleep 1
          done

          test -s "$SCREENSHOT"
          osascript -e 'tell application "EnterpriseMetricsLevel'"${LEVEL}"'" to quit' || true
          sleep 2
          pkill -f EnterpriseMetricsApp || true

          python3 - <<'PY'
          import csv, json, os, statistics, subprocess
          level = int(os.environ["LEVEL"])
          csv_path = os.environ["CSV"] if "CSV" in os.environ else None
          PY
        env:
          CSV: ${{ env.RESULT_DIR }}/metrics.csv

      - name: Build metrics summary and SVG chart
        run: |
          set -euxo pipefail
          CSV="$RESULT_DIR/metrics.csv"
          JSON="$RESULT_DIR/run.json"
          SVG="$RESULT_DIR/cpu-memory.svg"

          python3 - <<'PY'
          import csv, json, os, statistics, subprocess, html
          from pathlib import Path

          level = int(os.environ["LEVEL"])
          result_dir = Path(os.environ["RESULT_DIR"])
          csv_path = result_dir / "metrics.csv"
          svg_path = result_dir / "cpu-memory.svg"
          json_path = result_dir / "run.json"

          rows = []
          with csv_path.open() as f:
              for r in csv.DictReader(f):
                  rows.append({"second": int(r["second"]), "cpu": float(r["cpu_percent"]), "rss": float(r["rss_mb"])})

          cpus = [r["cpu"] for r in rows]
          mems = [r["rss"] for r in rows]
          data = {
              "runner": os.environ.get("RUNNER_LABEL", "macos-14"),
              "macOS": subprocess.check_output(["sw_vers", "-productVersion"], text=True).strip(),
              "level": level,
              "samples": len(rows),
              "rows": 100000 if level == 3 else (40000 if level == 2 else 10000),
              "configured_memory_mb": 640 if level == 3 else (256 if level == 2 else 96),
              "cpu_avg_percent": round(statistics.mean(cpus), 3),
              "cpu_max_percent": round(max(cpus), 3),
              "rss_avg_mb": round(statistics.mean(mems), 3),
              "rss_max_mb": round(max(mems), 3),
              "csv": str(csv_path),
              "svg": str(svg_path),
              "screenshot": str(result_dir / "screenshot.png"),
              "success": True,
          }
          json_path.write_text(json.dumps(data, indent=2, sort_keys=True))

          width, height = 920, 420
          left, right, top, bottom = 70, 40, 55, 60
          plot_w, plot_h = width-left-right, height-top-bottom
          max_cpu = max(max(cpus), 1)
          max_mem = max(max(mems), 1)
          max_cpu_axis = max(100, ((int(max_cpu) // 50) + 1) * 50)
          max_mem_axis = ((int(max_mem) // 100) + 1) * 100
          def x(sec):
              return left + (sec-1) * plot_w / max(1, len(rows)-1)
          def y_cpu(v):
              return top + plot_h - (v / max_cpu_axis) * plot_h
          def y_mem(v):
              return top + plot_h - (v / max_mem_axis) * plot_h
          cpu_points = " ".join(f"{x(r['second']):.1f},{y_cpu(r['cpu']):.1f}" for r in rows)
          mem_points = " ".join(f"{x(r['second']):.1f},{y_mem(r['rss']):.1f}" for r in rows)
          grid = []
          for i in range(6):
              yy = top + i * plot_h / 5
              grid.append(f'<line x1="{left}" y1="{yy:.1f}" x2="{left+plot_w}" y2="{yy:.1f}" stroke="#ddd"/>')
          svg = f'''<svg xmlns="http://www.w3.org/2000/svg" width="{width}" height="{height}" viewBox="0 0 {width} {height}">
            <rect width="100%" height="100%" fill="white"/>
            <text x="{left}" y="30" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="20" font-weight="700">Enterprise UI CPU and memory - level {level}</text>
            <text x="{left}" y="50" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" fill="#555">Rows: {data['rows']} | avg CPU: {data['cpu_avg_percent']}% | max RSS: {data['rss_max_mb']} MB</text>
            {''.join(grid)}
            <line x1="{left}" y1="{top}" x2="{left}" y2="{top+plot_h}" stroke="#333"/>
            <line x1="{left}" y1="{top+plot_h}" x2="{left+plot_w}" y2="{top+plot_h}" stroke="#333"/>
            <polyline points="{cpu_points}" fill="none" stroke="#2563eb" stroke-width="3"/>
            <polyline points="{mem_points}" fill="none" stroke="#dc2626" stroke-width="3"/>
            <text x="{left}" y="{height-20}" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12">Seconds</text>
            <text x="{left+plot_w-210}" y="{height-20}" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" fill="#2563eb">CPU %</text>
            <text x="{left+plot_w-145}" y="{height-20}" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" fill="#dc2626">RSS MB</text>
            <text x="10" y="{top+12}" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" fill="#2563eb">{max_cpu_axis}%</text>
            <text x="10" y="{top+plot_h}" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" fill="#2563eb">0%</text>
            <text x="{left+plot_w+8}" y="{top+12}" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" fill="#dc2626">{max_mem_axis} MB</text>
            <text x="{left+plot_w+8}" y="{top+plot_h}" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" fill="#dc2626">0 MB</text>
          </svg>'''
          svg_path.write_text(svg)
          print(json.dumps(data, indent=2))
          PY

      - name: Upload incremental metrics results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-enterprise-ui-metrics-results-${{ matrix.macos }}-level-${{ matrix.level }}
          path: macos-enterprise-ui-metrics-results/
          if-no-files-found: ignore

  aggregate-incremental-metrics:
    name: Aggregate and commit incremental metrics
    runs-on: ubuntu-latest
    needs: incremental-metrics
    if: always() && github.event_name != 'pull_request'
    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Download metrics artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: macos-enterprise-ui-metrics-results-*
          path: downloaded-metrics-results
          merge-multiple: true

      - name: Aggregate metric visualisations
        run: |
          set -euxo pipefail
          rm -rf macos-enterprise-ui-metrics-results
          mkdir -p macos-enterprise-ui-metrics-results
          if [ -d downloaded-metrics-results/macos-enterprise-ui-metrics-results ]; then
            cp -R downloaded-metrics-results/macos-enterprise-ui-metrics-results/. macos-enterprise-ui-metrics-results/
          else
            cp -R downloaded-metrics-results/. macos-enterprise-ui-metrics-results/ || true
          fi

          python3 - <<'PY'
          import json
          from pathlib import Path
          root = Path("macos-enterprise-ui-metrics-results")
          rows = [json.loads(p.read_text()) for p in sorted(root.glob("**/run.json"))]
          out = root / "summary.md"
          with out.open("w") as f:
              f.write("# macOS Enterprise UI Incremental CPU/Memory Metrics\n\n")
              f.write(f"Total incremental runs: {len(rows)}\n\n")
              f.write("| Runner | macOS | Level | Rows | Samples | Avg CPU % | Max CPU % | Avg RSS MB | Max RSS MB | Chart | Screenshot | CSV |\n")
              f.write("|---|---|---:|---:|---:|---:|---:|---:|---:|---|---|---|\n")
              for r in rows:
                  f.write(f"| {r['runner']} | {r['macOS']} | {r['level']} | {r['rows']} | {r['samples']} | {r['cpu_avg_percent']} | {r['cpu_max_percent']} | {r['rss_avg_mb']} | {r['rss_max_mb']} | [{r['svg']}]({r['svg']}) | [{r['screenshot']}]({r['screenshot']}) | [{r['csv']}]({r['csv']}) |\n")
              f.write("\n## Charts\n\n")
              for r in rows:
                  f.write(f"### Level {r['level']}\n\n![Level {r['level']} CPU and memory]({r['svg']})\n\n")
          print(out.read_text())
          PY
          cat macos-enterprise-ui-metrics-results/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Commit incremental metrics results
        run: |
          set -euxo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add macos-enterprise-ui-metrics-results/
          if git diff --cached --quiet; then
            echo "No metrics result changes to commit."
            exit 0
          fi
          git commit -m "Add incremental macOS enterprise UI CPU and memory metrics"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
